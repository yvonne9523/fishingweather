<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台海象與天氣即時查</title>
    <!-- PWA 必要的 Meta 標籤 -->
    <meta name="theme-color" content="#0284c7">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- 引入 Tailwind CSS 快速美化手機排版 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* 隱藏捲動條但保有功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12">

    <!-- 頂部導覽列 -->
    <header class="bg-sky-600 text-white p-4 sticky top-0 shadow-md z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">🌊 全台海象天氣觀測站</h1>
        <button id="refreshBtn" class="bg-sky-700 hover:bg-sky-800 px-3 py-1.5 rounded-lg text-sm transition-colors">🔄 重新整理</button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- 位置選擇器 -->
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
            <!-- 縣市下拉選單 -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">1. 選擇縣市</label>
                <select id="countySelect" class="w-full bg-slate-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-sky-500 text-base font-semibold">
                    <option value="基隆市">基隆市</option>
                    <option value="新北市">新北市</option>
                    <option value="臺北市">臺北市</option>
                    <option value="桃園市">桃園市</option>
                    <option value="新竹市">新竹市</option>
                    <option value="新竹縣">新竹縣</option>
                    <option value="苗栗縣">苗栗縣</option>
                    <option value="臺中市">臺中市</option>
                    <option value="彰化縣">彰化縣</option>
                    <option value="南投縣">南投縣</option>
                    <option value="雲林縣">雲林縣</option>
                    <option value="嘉義縣">嘉義縣</option>
                    <option value="嘉義市">嘉義市</option>
                    <option value="臺南市">臺南市</option>
                    <option value="高雄市">高雄市</option>
                    <option value="屏東縣">屏東縣</option>
                    <option value="宜蘭縣">宜蘭縣</option>
                    <option value="花蓮縣">花蓮縣</option>
                    <option value="臺東縣">臺東縣</option>
                    <option value="澎湖縣">澎湖縣</option>
                    <option value="金門縣">金門縣</option>
                    <option value="連江縣">連江縣</option>
                </select>
            </div>

            <!-- 地名/觀測點下拉選單 -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">2. 選擇對應觀測點 (地名)</label>
                <select id="locationSelect" class="w-full bg-slate-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-sky-500 text-base font-semibold">
                    <!-- 由 JavaScript 靜態資料或動態生成 -->
                </select>
            </div>
        </div>

        <!-- 載入中狀態 -->
        <div id="loading" class="text-center py-8 text-slate-400 font-medium">資料載入中...</div>

        <!-- 主要資訊區塊 (預設隱藏，載入完成後顯示) -->
        <div id="content" class="hidden space-y-4">
            
            <!-- 即時天氣區塊 -->
            <section class="bg-gradient-to-br from-sky-400 to-blue-600 text-white p-6 rounded-3xl shadow-lg relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-start">
                        <h2 class="text-lg font-medium opacity-90" id="weatherStation">觀測站 --</h2>
                        <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full" id="weatherTime">--:--</span>
                    </div>
                    <div class="flex items-baseline mt-2">
                        <span class="text-6xl font-extrabold tracking-tighter" id="temp">--</span>
                        <span class="text-2xl font-semibold ml-1">°C</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-white/20 text-sm">
                        <div>
                            <span class="block opacity-75">💨 風速</span>
                            <span class="text-base font-semibold mt-0.5 block" id="windSpeed">-- m/s</span>
                        </div>
                        <div>
                            <span class="block opacity-75">💧 濕度</span>
                            <span class="text-base font-semibold mt-0.5 block" id="humidity">-- %</span>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 text-9xl opacity-10 font-bold">☀️</div>
            </section>

            <!-- 潮汐預報區塊 (包含今天、前後兩天) -->
            <section class="space-y-3" id="tideSection">
                <h3 class="text-base font-bold text-slate-500 px-1 uppercase tracking-wider">🌊 五日潮汐動態 (前天～後天)</h3>
                <div id="tideContainer" class="space-y-3">
                    <!-- 由 JavaScript 動態生成卡片 -->
                </div>
            </section>
        </div>
    </main>

    <script>
        // ----------------- 設定區 -----------------
        // 請在此處填入您的中央氣象署 API 授權碼
        const API_KEY = 'CWA-14A75B7D-0B59-4AC5-9154-CE83FD3B9BF4'; 
        // ----------------------------------------

        // 預先內建的全台對應靜態資料（確保即使 API 斷線或被 CORS 阻擋，下拉選單依然完美呈現！）
        const STATION_MAPPING = {
            "基隆市": [
                { name: "基隆", weatherStation: "基隆", tideLocation: "基隆" }
            ],
            "新北市": [
                { name: "淡水", weatherStation: "淡水", tideLocation: "淡水" },
                { name: "龍洞", weatherStation: "龍洞", tideLocation: "龍洞" },
                { name: "福隆", weatherStation: "福隆", tideLocation: "福隆" },
                { name: "板橋", weatherStation: "板橋", tideLocation: null }
            ],
            "臺北市": [
                { name: "臺北", weatherStation: "臺北", tideLocation: null },
                { name: "鞍部", weatherStation: "鞍部", tideLocation: null },
                { name: "大屯山", weatherStation: "大屯山", tideLocation: null }
            ],
            "桃園市": [
                { name: "永安", weatherStation: "永安", tideLocation: "竹圍" },
                { name: "新屋", weatherStation: "新屋", tideLocation: "竹圍" },
                { name: "大園", weatherStation: "大園", tideLocation: "竹圍" }
            ],
            "新竹市": [
                { name: "新竹", weatherStation: "新竹", tideLocation: "新竹" }
            ],
            "新竹縣": [
                { name: "新埔", weatherStation: "新埔", tideLocation: "新竹" },
                { name: "竹東", weatherStation: "竹東", tideLocation: "新竹" }
            ],
            "苗栗縣": [
                { name: "後龍", weatherStation: "後龍", tideLocation: "通霄" },
                { name: "三義", weatherStation: "三義", tideLocation: null }
            ],
            "臺中市": [
                { name: "臺中港", weatherStation: "臺中港", tideLocation: "臺中港" },
                { name: "臺中", weatherStation: "臺中", tideLocation: null }
            ],
            "彰化縣": [
                { name: "鹿港", weatherStation: "鹿港", tideLocation: "溫仔" },
                { name: "彰化", weatherStation: "彰化", tideLocation: null }
            ],
            "南投縣": [
                { name: "日月潭", weatherStation: "日月潭", tideLocation: null },
                { name: "埔里", weatherStation: "埔里", tideLocation: null }
            ],
            "雲林縣": [
                { name: "麥寮", weatherStation: "麥寮", tideLocation: "台西" },
                { name: "台西", weatherStation: "台西", tideLocation: "台西" }
            ],
            "嘉義縣": [
                { name: "東石", weatherStation: "東石", tideLocation: "東石" },
                { name: "阿里山", weatherStation: "阿里山", tideLocation: null }
            ],
            "嘉義市": [
                { name: "嘉義", weatherStation: "嘉義", tideLocation: null }
            ],
            "臺南市": [
                { name: "安平", weatherStation: "安平", tideLocation: "安平" },
                { name: "臺南", weatherStation: "臺南", tideLocation: "安平" }
            ],
            "高雄市": [
                { name: "高雄港", weatherStation: "高雄", tideLocation: "高雄" },
                { name: "旗津", weatherStation: "旗津", tideLocation: "高雄" }
            ],
            "屏東縣": [
                { name: "恆春", weatherStation: "恆春", tideLocation: "後壁湖" },
                { name: "小琉球", weatherStation: "琉球", tideLocation: "琉球" },
                { name: "墾丁", weatherStation: "墾丁", tideLocation: "後壁湖" },
                { name: "東港", weatherStation: "東港", tideLocation: "東港" }
            ],
            "宜蘭縣": [
                { name: "蘇澳港", weatherStation: "蘇澳", tideLocation: "蘇澳" },
                { name: "頭城", weatherStation: "頭城", tideLocation: "烏石" },
                { name: "宜蘭", weatherStation: "宜蘭", tideLocation: null }
            ],
            "花蓮縣": [
                { name: "花蓮港", weatherStation: "花蓮", tideLocation: "花蓮" },
                { name: "太魯閣", weatherStation: "太魯閣", tideLocation: null }
            ],
            "臺東縣": [
                { name: "臺東港", weatherStation: "臺東", tideLocation: "臺東" },
                { name: "成功", weatherStation: "成功", tideLocation: "成功" },
                { name: "綠島", weatherStation: "綠島", tideLocation: "綠島" },
                { name: "蘭嶼", weatherStation: "蘭嶼", tideLocation: "蘭嶼" }
            ],
            "澎湖縣": [
                { name: "馬公", weatherStation: "澎湖", tideLocation: "馬公" },
                { name: "吉貝", weatherStation: "吉貝", tideLocation: "吉貝" },
                { name: "東吉島", weatherStation: "東吉島", tideLocation: "東吉" }
            ],
            "金門縣": [
                { name: "金門", weatherStation: "金門", tideLocation: "金門" },
                { name: "九宮碼頭", weatherStation: "九宮碼頭", tideLocation: "金門" }
            ],
            "連江縣": [
                { name: "馬祖", weatherStation: "馬祖", tideLocation: "福澳" },
                { name: "東引", weatherStation: "東引", tideLocation: "東引" }
            ]
        };

        // DOM 元素定義
        const countySelect = document.getElementById('countySelect');
        const locationSelect = document.getElementById('locationSelect');
        const loadingEl = document.getElementById('loading');
        const contentEl = document.getElementById('content');
        const refreshBtn = document.getElementById('refreshBtn');
        const tideSection = document.getElementById('tideSection');

        // 全域變數，紀錄 API 資料
        let rawWeatherData = null;
        let rawTideData = null;

        // 初始化
        window.addEventListener('DOMContentLoaded', initializeApp);
        countySelect.addEventListener('change', handleCountyChange);
        locationSelect.addEventListener('change', handleLocationChange);
        refreshBtn.addEventListener('click', forceRefresh);

        // 初始化 App：嘗試取得 API 資料，失敗亦可正常展示介面
        async function initializeApp() {
            if (API_KEY === 'CWA-14A75B7D-0B59-4AC5-9154-CE83FD3B9BF4' || !API_KEY) {
                alert('請先在 index.html 檔案中填入您的中央氣象署 API 授權碼！');
                showLoading(false);
                return;
            }
            showLoading(true);
            
            try {
                // 同步取得天氣與潮汐
                const [weatherRes, tideRes] = await Promise.all([
                    fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0001-001?Authorization=${API_KEY}`),
                    fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`)
                ]);

                const weatherJson = await weatherRes.json();
                if (weatherJson.success === "true") {
                    rawWeatherData = weatherJson.records.Station;
                }

                const tideJson = await tideRes.json();
                if (tideJson.success === "true") {
                    rawTideData = tideJson.records.TideForecasts.Location;
                }

            } catch (error) {
                console.warn('⚠️ 偵測到本機 file:// 環境或網路不通，將啟用離線靜態選單！');
            }

            // 無論 API 成功與否，立刻渲染預設縣市的選單
            handleCountyChange();
            showLoading(false);
        }

        // 當縣市改變時：讀取 STATION_MAPPING 靜態清單更新第二層
        function handleCountyChange() {
            const selectedCounty = countySelect.value;
            locationSelect.innerHTML = '';

            const list = STATION_MAPPING[selectedCounty] || [];

            if (list.length > 0) {
                list.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.name;
                    opt.innerText = `${item.name} ${item.tideLocation ? '🌊' : '☀️'}`;
                    
                    // 將對應的測站屬性存在 dataset 中
                    opt.dataset.weatherStation = item.weatherStation;
                    opt.dataset.tideLocation = item.tideLocation || '';
                    locationSelect.appendChild(opt);
                });
                handleLocationChange();
            } else {
                const opt = document.createElement('option');
                opt.innerText = '無觀測資料';
                locationSelect.appendChild(opt);
            }
        }

        // 當第二層地點改變時：渲染對應的天氣與潮汐
        function handleLocationChange() {
            const selectedOpt = locationSelect.selectedOptions[0];
            if (!selectedOpt) return;

            const targetWeather = selectedOpt.dataset.weatherStation;
            const targetTide = selectedOpt.dataset.tideLocation;

            // 1. 渲染天氣
            if (rawWeatherData && targetWeather) {
                const matchedWeather = rawWeatherData.find(st => st.StationName === targetWeather);
                renderWeather(matchedWeather, targetWeather);
            } else {
                // API 失敗（本機執行）時的預設骨架
                renderWeather(null, targetWeather);
            }

            // 2. 渲染潮汐
            if (targetTide) {
                tideSection.classList.remove('hidden');
                if (rawTideData) {
                    const matchedTide = rawTideData.find(loc => loc.LocationName === targetTide);
                    if (matchedTide) {
                        renderTide(matchedTide.TideTimeDailyForecast);
                    } else {
                        renderTidePlaceholder("目前無即時潮汐預報");
                    }
                } else {
                    renderTidePlaceholder("請將網頁部署上線以取得即時潮汐資料");
                }
            } else {
                tideSection.classList.add('hidden');
            }
        }

        // 渲染天氣 HTML
        function renderWeather(station, fallbackName) {
            if (station) {
                const obsTime = station.ObsTime.DateTime ? station.ObsTime.DateTime.substring(11, 16) : '--:--';
                document.getElementById('weatherStation').innerText = `${countySelect.value} (${station.StationName})`;
                document.getElementById('weatherTime').innerText = `更新於 ${obsTime}`;
                document.getElementById('temp').innerText = station.WeatherElement.AirTemperature !== -99 ? station.WeatherElement.AirTemperature : '--';
                document.getElementById('windSpeed').innerText = `${station.WeatherElement.WindSpeed} m/s`;
                document.getElementById('humidity').innerText = `${station.WeatherElement.RelativeHumidity} %`;
            } else {
                document.getElementById('weatherStation').innerText = `${countySelect.value} (${fallbackName})`;
                document.getElementById('weatherTime').innerText = `⚠️ 點擊兩次本地開啟被瀏覽器阻擋`;
                document.getElementById('temp').innerText = '--';
                document.getElementById('windSpeed').innerText = '-- m/s';
                document.getElementById('humidity').innerText = '-- %';
            }
        }

        // 渲染潮汐 HTML
        function renderTide(periods) {
            const container = document.getElementById('tideContainer');
            container.innerHTML = '';

            if (!periods || periods.length === 0) {
                renderTidePlaceholder("暫無潮汐預報資料");
                return;
            }

            const today = new Date();
            const targetDates = [];
            for (let i = -2; i <= 2; i++) {
                const d = new Date();
                d.setDate(today.getDate() + i);
                targetDates.push({
                    dateString: d.toISOString().split('T')[0],
                    label: i === -2 ? '前天' : i === -1 ? '昨天' : i === 0 ? '今天' : i === 1 ? '明天' : '後天',
                    isToday: i === 0
                });
            }

            targetDates.forEach(target => {
                const dayData = periods.find(p => p.Date === target.dateString);
                if (!dayData) return;

                let highTides = [];
                let lowTides = [];
                let heights = [];

                dayData.TideTimeForecast.forEach(t => {
                    const timeStr = t.Time.split(' ')[1].substring(0, 5);
                    const height = parseInt(t.TideHeightCM);
                    heights.push(height);

                    if (t.WaveHeight.includes('滿潮')) {
                        highTides.push(`${timeStr} (${height}cm)`);
                    } else if (t.WaveHeight.includes('乾潮')) {
                        lowTides.push(`${timeStr} (${height}cm)`);
                    }
                });

                const maxTideDifference = heights.length > 0 ? (Math.max(...heights) - Math.min(...heights)) : 0;

                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl shadow-sm border transition-all ${
                    target.isToday 
                    ? 'bg-white border-sky-400 ring-2 ring-sky-100' 
                    : 'bg-white border-slate-100 opacity-85'
                }`;

                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                        <div class="flex items-center space-x-2">
                            <span class="text-base font-bold text-slate-800">${dayData.Date}</span>
                            <span class="px-2 py-0.5 text-xs font-semibold rounded-full ${
                                target.isToday ? 'bg-sky-500 text-white' : 'bg-slate-200 text-slate-600'
                            }">${target.label}</span>
                        </div>
                        <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">最大潮差: ${maxTideDifference} cm</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div class="bg-red-50/60 p-2.5 rounded-xl">
                            <span class="font-bold text-red-600 block mb-1">🔴 滿潮時間</span>
                            <div class="space-y-0.5 text-slate-700 font-medium">${highTides.join('<br>') || '無資料'}</div>
                        </div>
                        <div class="bg-blue-50/60 p-2.5 rounded-xl">
                            <span class="font-bold text-blue-600 block mb-1">🔵 乾潮時間</span>
                            <div class="space-y-0.5 text-slate-700 font-medium">${lowTides.join('<br>') || '無資料'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 潮汐無資料或 API 被擋時的提示
        function renderTidePlaceholder(message) {
            const container = document.getElementById('tideContainer');
            container.innerHTML = `
                <div class="text-center py-8 text-slate-400 text-sm bg-white rounded-2xl border border-slate-100 p-4 leading-relaxed">
                    📍 ${message}<br>
                    <span class="text-xs opacity-70 mt-1 block">（請將此網頁部署至 GitHub Pages、Vercel 等線上伺服器，即能正常獲取即時數據！）</span>
                </div>
            `;
        }

        // 強制刷新資料
        function forceRefresh() {
            rawWeatherData = null;
            rawTideData = null;
            initializeApp();
        }

        function showLoading(isLoading) {
            if (isLoading) {
                loadingEl.classList.remove('hidden');
                contentEl.classList.add('hidden');
            } else {
                loadingEl.classList.add('hidden');
                contentEl.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
