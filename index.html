<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全台海象與天氣即時查</title>
    <meta name="theme-color" content="#0284c7">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-12 relative overflow-x-hidden">

    <!-- 側欄遮罩背景 -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden transition-opacity" onclick="closeSidebar()"></div>

    <!-- 左側抽屜式側欄 -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-80 max-w-[85vw] bg-white shadow-2xl z-50 transform -translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="bg-sky-700 text-white p-4 flex justify-between items-center shadow-sm">
            <h2 class="text-lg font-bold flex items-center gap-2">🧭 釣點與生態護魚資訊</h2>
            <button onclick="closeSidebar()" class="text-xl w-8 h-8 rounded-lg hover:bg-sky-800 flex items-center justify-center">✕</button>
        </div>

        <!-- 側欄頁籤分類按鈕 -->
        <div class="flex border-b border-slate-100 bg-slate-50">
            <button id="sideTab-sea" onclick="switchSideTab('sea')" class="flex-1 py-3 font-bold text-sm text-sky-600 border-b-2 border-sky-600 bg-white transition-all">🎣 海 - 開放釣點</button>
            <button id="sideTab-river" onclick="switchSideTab('river')" class="flex-1 py-3 font-bold text-sm text-slate-500 transition-all">🐟 溪 - 封溪護魚</button>
        </div>

        <!-- 側欄內容捲動區 -->
        <div class="flex-1 overflow-y-auto p-4 space-y-3 no-scrollbar" id="sidebarContent">
            <!-- 動態渲染卡片列表 -->
        </div>
    </aside>

    <!-- 頂部導覽列 (新增左側 ☰ 側欄按鈕) -->
    <header class="bg-sky-600 text-white p-4 sticky top-0 shadow-md z-40 flex justify-between items-center">
        <div class="flex items-center gap-2.5">
            <button onclick="openSidebar()" class="bg-sky-700 hover:bg-sky-800 w-10 h-10 rounded-xl flex items-center justify-center text-xl transition-colors shadow-sm focus:outline-none">☰</button>
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-1.5">
                <span id="headerTitle">📍 現在位置觀測</span>
            </h1>
        </div>
        <div class="flex items-center gap-1.5">
            <button id="togglePageBtn" class="bg-sky-700 hover:bg-sky-800 w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-colors shadow-sm focus:outline-none">🔍</button>
            <button id="refreshBtn" class="bg-sky-700 hover:bg-sky-800 w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-colors shadow-sm focus:outline-none">🔄</button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- 天氣特報公告欄 -->
        <div id="alertBox" class="hidden bg-red-50 border border-red-200 text-red-700 p-3.5 rounded-2xl text-sm font-bold flex items-start gap-2 shadow-sm animate-pulse">
            <span class="text-lg">⚠️</span>
            <div class="space-y-0.5">
                <p id="alertTitle" class="text-red-600 font-extrabold"></p>
                <p id="alertBody" class="text-xs opacity-90 font-bold text-red-600"></p>
            </div>
        </div>

        <!-- 下拉選單頁 (手動模式) -->
        <div id="searchPage" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3 hidden transition-all">
            <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-1">
                <span class="text-sm font-bold text-slate-500">🔍 切換其他觀測點</span>
                <button id="backToHomeBtn" class="text-xs bg-slate-100 hover:bg-slate-200 px-2 py-1 rounded-md text-slate-600 font-medium">🏠 返回現在位置</button>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">1. 選擇縣市 (由北到南排序)</label>
                <select id="countySelect" class="w-full bg-slate-100 p-3 rounded-xl border-none focus:ring-2 focus:ring-sky-500 text-base font-semibold">
                    <option value="基隆市">基隆市</option>
                    <option value="臺北市">臺北市 (內陸無潮汐)</option>
                    <option value="新北市">新北市</option>
                    <option value="桃園市">桃園市</option>
                    <option value="新竹市">新竹市</option>
                    <option value="新竹縣">新竹縣</option>
                    <option value="苗栗縣">苗栗縣</option>
                    <option value="臺中市">臺中市</option>
                    <option value="彰化縣">彰化縣</option>
                    <option value="南投縣">南投縣 (內陸無潮汐)</option>
                    <option value="雲林縣">雲林縣</option>
                    <option value="嘉義市">嘉義市 (內陸無潮汐)</option>
                    <option value="嘉義縣">嘉義縣</option>
                    <option value="臺南市">臺南市</option>
                    <option value="高雄市">高雄市</option>
                    <option value="屏東縣">屏東縣</option>
                    <option value="宜蘭縣">宜蘭縣</option>
                    <option value="花蓮縣">花蓮縣</option>
                    <option value="臺東縣">臺東縣</option>
                    <option value="澎湖縣">澎湖縣</option>
                    <option value="金門縣">金門縣</option>
                    <option value="連江縣">連江縣</option>

            </div>
            <div>

                </select>
            </div>
        </div>

        <!-- 數據呈現主區 -->
        <div id="content" class="space-y-4">
            
            <!-- 即時天氣綜合卡片 -->
            <section id="weatherSection" class="bg-gradient-to-br from-sky-400 to-blue-600 text-white p-6 rounded-3xl shadow-lg relative overflow-hidden">
                <div class="relative z-10 flex justify-between items-stretch min-h-36">
                    <div class="flex flex-col justify-between space-y-2">
                        <div>
                            <h2 class="text-xl font-bold tracking-wide" id="weatherStation">觀測站 --</h2>
                            <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full inline-block mt-1" id="weatherTime">--:--</span>
                        </div>
                        <div class="flex items-baseline">
                            <span class="text-6xl font-extrabold tracking-tighter" id="temp">--</span>
                            <span class="text-2xl font-semibold ml-1">°C</span>
                        </div>
                    </div>
                    <div class="flex flex-col justify-between items-end">
                        <div id="weatherIcon" class="text-6xl filter drop-shadow-md">☀️</div>
                        <div class="text-right text-xs bg-black/15 p-2 rounded-xl border border-white/10 backdrop-blur-sm space-y-0.5">
                            <div>🌅 日出 <span id="sunriseTime" class="font-bold">--:--</span></div>
                            <div>🌇 日沒 <span id="sunsetTime" class="font-bold">--:--</span></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-x-4 gap-y-2.5 mt-5 pt-4 border-t border-white/20 text-sm relative z-10">
                    <div>
                        <span class="block opacity-75">💨 風速</span>
                        <span class="text-base font-semibold mt-0.5 block" id="windSpeed">-- m/s</span>
                    </div>
                    <div>
                        <span class="block opacity-75">💧 濕度</span>
                        <span class="text-base font-semibold mt-0.5 block" id="humidity">-- %</span>
                    </div>
                    <div>
                        <span class="block opacity-75">🧭 風向</span>
                        <span class="text-base font-semibold mt-0.5 block" id="windDirection">--</span>
                    </div>
                    <div>
                        <span class="block opacity-75">🌡️ 體感溫度</span>
                        <span class="text-base font-semibold mt-0.5 block" id="apparentTemp">-- °C</span>
                    </div>
                </div>
            </section>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button id="tabBtn-tide" onclick="switchSubSection('tide')" class="px-4 py-2 rounded-xl font-bold text-sm bg-sky-600 text-white shadow-sm transition-all shrink-0">🌊 當日潮汐</button>
                <button id="tabBtn-rain" onclick="switchSubSection('rain')" class="px-4 py-2 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-100 shadow-sm transition-all shrink-0">🌧️ 24H實測累積雨量</button>

            </div>

                    </div>
                </div>
            </div>

            "臺東縣": [{ locationId: "10014010", locationName: "臺東縣臺東市", weatherStation: "臺東", lat: 22.7908, lng: 121.1931 }],
            "澎湖縣": [{ locationId: "10016010", locationName: "澎湖縣馬公市", weatherStation: "澎湖", lat: 23.5603, lng: 119.5781 }],
            "金門縣": [{ locationId: "09020040", locationName: "金門縣金寧鄉", weatherStation: "金門", lat: 24.4617, lng: 118.2975 }],
            "連江縣": [{ locationId: "09007010", locationName: "連江縣南竿鄉", weatherStation: "馬祖", lat: 26.1617, lng: 119.9428 }]
        };

        const countySelect = document.getElementById('countySelect');
        const locationSelect = document.getElementById('locationSelect');
        const searchPage = document.getElementById('searchPage');
        const togglePageBtn = document.getElementById('togglePageBtn');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        const headerTitle = document.getElementById('headerTitle');

        let rawWeatherData = null;
        let isUsingManualSearch = false;

        window.addEventListener('DOMContentLoaded', initializeApp);
        countySelect.addEventListener('change', handleCountyChange);
        locationSelect.addEventListener('change', handleLocationChange);
        refreshBtn.addEventListener('click', forceRefresh);
        togglePageBtn.addEventListener('click', toggleSearchPage);
        backToHomeBtn.addEventListener('click', resetToGPSHome);

        async function initializeApp() {
            API_KEY = await loadConfig();
            if (!API_KEY) return;

            await fetchWeatherBaseData();
            runGPSLocation();
        }

        // --- 側欄開關邏輯 ---
        function openSidebar() {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.remove('hidden');
            renderSidebarContent();
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.add('hidden');
        }

        function switchSideTab(type) {
            sideTabType = type;
            const btnSea = document.getElementById('sideTab-sea');
            const btnRiver = document.getElementById('sideTab-river');

            if (type === 'sea') {
                btnSea.className = "flex-1 py-3 font-bold text-sm text-sky-600 border-b-2 border-sky-600 bg-white transition-all";
                btnRiver.className = "flex-1 py-3 font-bold text-sm text-slate-500 transition-all bg-slate-50";
            } else {
                btnRiver.className = "flex-1 py-3 font-bold text-sm text-sky-600 border-b-2 border-sky-600 bg-white transition-all";
                btnSea.className = "flex-1 py-3 font-bold text-sm text-slate-500 transition-all bg-slate-50";
            }
            renderSidebarContent();
        }

        function renderSidebarContent() {
            const container = document.getElementById('sidebarContent');
            container.innerHTML = '';

            const countyNormalized = currentCounty.replace('台北', '臺北').replace('台中', '臺中').replace('台南', '臺南').replace('台東', '臺東');

            if (sideTabType === 'sea') {
                // 渲染海 - 開放釣點[cite: 7]
                const list = SEA_DATA.filter(item => item.county === countyNormalized || item.county.includes(countyNormalized.substring(0,2)));
                
                if (list.length > 0) {
                    list.forEach(item => {
                        const card = document.createElement('div');
                        card.className = "bg-slate-50 border border-slate-100 p-3.5 rounded-2xl space-y-1 shadow-sm";
                        card.innerHTML = `
                            <div class="flex justify-between items-center">
                                <span class="font-extrabold text-sm text-slate-800">${item.name}</span>
                                <span class="text-[10px] bg-sky-100 text-sky-700 px-2 py-0.5 rounded-md font-bold">${item.kind}</span>
                            </div>
                            <p class="text-xs text-slate-500">📍 ${item.county} 合法開放垂釣區域</p>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">📍 ${currentCounty} 暫無登錄之開放海釣點資料。</div>`;
                }
            } else {
                // 渲染溪 - 封溪護魚地點[cite: 6]
                const list = RIVER_DATA.filter(item => item.公告縣市 === countyNormalized || item.公告縣市.includes(countyNormalized.substring(0,2)));
                
                if (list.length > 0) {
                    list.forEach(item => {
                        const card = document.createElement('div');
                        card.className = "bg-red-50/50 border border-red-100 p-3.5 rounded-2xl space-y-1.5 shadow-sm";
                        card.innerHTML = `
                            <div class="flex justify-between items-center border-b border-red-100 pb-1.5">
                                <span class="font-extrabold text-sm text-red-700">🚫 ${item.溪流名稱}</span>
                                <span class="text-[10px] bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-bold">${item.地區 || '全區'}</span>
                            </div>
                            <p class="text-xs text-slate-600 font-medium leading-relaxed"><strong>禁釣範圍：</strong>${item.封溪範圍}</p>
                            <div class="text-[11px] text-slate-400 flex justify-between pt-1">
                                <span>📅 ${item.封溪時間}</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">✅ ${currentCounty} 目前暫無公告封溪護魚禁釣河段。</div>`;
                }
            }
        }

        async function fetchWeatherBaseData() {
            try {
                const weatherRes = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0003-001?Authorization=${API_KEY}`);
                const weatherJson = await weatherRes.json();
                if (weatherJson.success === "true") rawWeatherData = weatherJson.records.Station;
            } catch (error) { console.warn('10分鐘即時氣象 API 連線失敗', error); }
        }

        function toggleSearchPage() {
            if (searchPage.classList.contains('hidden')) {
                searchPage.classList.remove('hidden');
                togglePageBtn.innerText = '🏠';
                isUsingManualSearch = true;
                headerTitle.innerText = '🔍 手動查閱模式';
                handleCountyChange();
            } else { resetToGPSHome(); }
        }

        function resetToGPSHome() {
            searchPage.classList.add('hidden');
            togglePageBtn.innerText = '🔍';
            isUsingManualSearch = false;
            headerTitle.innerText = '📍 現在位置觀測';
            runGPSLocation();
        }

        function runGPSLocation() {
            if (!navigator.geolocation) { toggleSearchPage(); return; }
            headerTitle.innerText = '📍 定位中...';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    let closestCounty = "基隆市";
                    let closestLoc = null;
                    let minDistance = Infinity;

                    if (userLat >= 24.96 && userLat <= 25.21 && userLng >= 121.46 && userLng <= 121.67) {
                        closestCounty = "臺北市";
                        closestLoc = STATION_MAPPING["臺北市"][0];
                    } else {
                        for (const [county, locations] of Object.entries(STATION_MAPPING)) {
                            locations.forEach(loc => {
                                if (!loc.lat || !loc.lng) return;
                                const dist = Math.sqrt(Math.pow(loc.lat - userLat, 2) + Math.pow(loc.lng - userLng, 2));
                                if (dist < minDistance) {
                                    minDistance = dist;
                                    closestCounty = county;
                                    closestLoc = loc;
                                }
                            });
                        }
                    }

                    if (closestLoc) {
                        currentCounty = closestCounty;
                        headerTitle.innerText = `📍 現在位置 (${closestCounty.substring(0,3)})`;
                        updateMainContent(closestCounty, closestLoc.weatherStation, closestLoc.locationName, closestLoc.locationId);
                    }
                },
                (error) => { toggleSearchPage(); },
                { enableHighAccuracy: true, timeout: 7000 }
            );
        }

        function handleCountyChange() {
            if (!isUsingManualSearch) return;
            const selectedCounty = countySelect.value;
            currentCounty = selectedCounty;
            locationSelect.innerHTML = '';
            const list = STATION_MAPPING[selectedCounty] || [];

            list.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.locationName;
                opt.innerText = item.locationName;
                opt.dataset.weatherStation = item.weatherStation;
                opt.dataset.locationId = item.locationId || '';
                locationSelect.appendChild(opt);
            });
            handleLocationChange();
        }

        function handleLocationChange() {
            if (!isUsingManualSearch) return;
            const selectedOpt = locationSelect.selectedOptions[0];
            if (!selectedOpt) return;
            updateMainContent(countySelect.value, selectedOpt.dataset.weatherStation, selectedOpt.value, selectedOpt.dataset.locationId);
        }

        async function updateMainContent(countyName, weatherStationName, tideLocationName, locationId) {
            currentCounty = countyName;
            if (rawWeatherData) {
                let matchedWeather = rawWeatherData.find(st => st.StationName === weatherStationName && st.GeoInfo && st.GeoInfo.CountyName === countyName);
                if (!matchedWeather) {
                    matchedWeather = rawWeatherData.find(st => st.GeoInfo && st.GeoInfo.CountyName === countyName && st.WeatherElement && st.WeatherElement.AirTemperature !== -99);
                }
                if (matchedWeather) renderWeather(countyName, matchedWeather);
            }
            fetchAlertHazards(countyName);
            fetchRainfallData(countyName, weatherStationName);
            fetchTideForecast(tideLocationName);
        }

        async function fetchAlertHazards(countyName) {
            const alertBox = document.getElementById('alertBox');
            alertBox.classList.add('hidden');

            try {
                const alertRes = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/W-C0033-001?Authorization=${API_KEY}`);
                const alertJson = await alertRes.json();
                
                if (alertJson.success === "true" && alertJson.records.location) {
                    const matchedLoc = alertJson.records.location.find(l => l.locationName === countyName || l.locationName === countyName.replace('臺', '台'));
                    if (matchedLoc && matchedLoc.hazardConditions && matchedLoc.hazardConditions.hazards.length > 0) {
                        const nowTime = new Date();
                        let activeHazards = [];

                        matchedLoc.hazardConditions.hazards.forEach(hz => {
                            const startTime = new Date(hz.validTime.startTime);
                            const endTime = new Date(hz.validTime.endTime);
                            if (nowTime >= startTime && nowTime <= endTime) {
                                activeHazards.push(hz.info.phenomena + hz.info.significance);
                            }
                        });

                        if (activeHazards.length > 0) {
                            alertBox.classList.remove('hidden');
                            document.getElementById('alertTitle').innerText = `天氣特報警告 (${countyName})`;
                            document.getElementById('alertBody').innerText = `該區域正發布：${activeHazards.join(' / ')}，請注意安全。`;
                        }
                    }
                }

                let sRise = "05:15"; let sSet = "18:41";
                if (countyName === "臺北市" || countyName === "新北市" || countyName === "基隆市") {
                    sRise = "05:12"; sSet = "18:47";
                }
                document.getElementById('sunriseTime').innerText = sRise;
                document.getElementById('sunsetTime').innerText = sSet;

            } catch (err) { console.error('特報解析異常', err); }
        }

        async function fetchRainfallData(countyName, weatherStationName) {
            const rainContainer = document.getElementById('rainContainer');
            rainContainer.innerHTML = '<div class="col-span-3 py-2 text-slate-400 text-xs">🔄 實測雨量連線中...</div>';

            try {
                const rainRes = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0002-001?Authorization=${API_KEY}`);
                const rainJson = await rainRes.json();

                if (rainJson.success === "true") {
                    const stations = rainJson.records.Station;
                    let matchedRainStation = stations.find(s => s.StationName.includes(weatherStationName) && s.GeoInfo && s.GeoInfo.CountyName === countyName);
                    if (!matchedRainStation) {
                        matchedRainStation = stations.find(s => s.GeoInfo && s.GeoInfo.CountyName === countyName);
                    }

                    rainContainer.innerHTML = '';
                    if (matchedRainStation && matchedRainStation.RainfallElement) {
                        const rf = matchedRainStation.RainfallElement;
                        const items = [
                            { label: "1 小時累積", val: rf.Past1hr.Precipitation },
                            { label: "6 小時累積", val: rf.Past6Hr.Precipitation },
                            { label: "24 小時累積", val: rf.Past24hr.Precipitation }
                        ];

                        items.forEach(it => {
                            const valNum = parseFloat(it.val);
                            const displayVal = (valNum < 0 || isNaN(valNum)) ? '0.0' : valNum.toFixed(1);
                            const block = document.createElement('div');
                            block.className = 'bg-slate-50 p-2.5 rounded-xl border border-slate-100 flex flex-col items-center';
                            block.innerHTML = `
                                <span class="text-slate-400 text-[10px] font-bold">${it.label}</span>
                                <span class="text-blue-500 font-extrabold mt-1 text-sm">${displayVal} mm</span>
                            `;
                            rainContainer.appendChild(block);
                        });
                    } else {
                        rainContainer.innerHTML = '<div class="col-span-3 py-2 text-slate-400 text-xs">無實測雨量數據</div>';
                    }
                }
            } catch (err) {
                console.error(err);
                rainContainer.innerHTML = '<div class="col-span-3 py-2 text-slate-400 text-xs">雨量資料讀取失敗</div>';
            }
        }

        async function fetchTideForecast(tideLocationName) {
            const tideContainer = document.getElementById('tideContainer');
            if (!tideLocationName) {
                tideContainer.innerHTML = '<div class="text-center py-6 text-slate-400 text-sm">📍 此地區不包含沿海潮汐預報。</div>';
                return;
            }
            tideContainer.innerHTML = '<div class="text-center py-6 text-slate-400 text-sm">🔄 正在連線撈取最新潮汐動態...</div>';
            
            const d1 = new Date();
            const d2 = new Date();
            d2.setDate(d1.getDate() + 1);

            const todayStr = d1.toISOString().split('T')[0];
            const tomorrowStr = d2.toISOString().split('T')[0];

            try {
                const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}&LocationName=${encodeURIComponent(tideLocationName)}&Date=${todayStr}&Date=${tomorrowStr}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.success === "true" && data.records.TideForecasts.length > 0) {
                    let periods = data.records.TideForecasts[0].Location.TimePeriods.Daily;
                    periods.sort((a, b) => new Date(a.Date) - new Date(b.Date));
                    renderTide(periods);
                } else {
                    tideContainer.innerHTML = `<div class="text-center py-6 text-slate-400 text-sm">📍 氣象署暫無 [${tideLocationName}] 今日數據</div>`;
                }
            } catch (e) { tideContainer.innerHTML = '<div class="text-center py-6 text-red-400 text-sm">⚠️ 潮汐加載異常。</div>'; }
        }

        function renderWeather(countyName, station) {
            const obsTime = station.ObsTime.DateTime ? station.ObsTime.DateTime.substring(11, 16) : '--:--';
            document.getElementById('weatherStation').innerText = `${countyName} (${station.StationName})`;
            document.getElementById('weatherTime').innerText = `更新於 ${obsTime}`;
            
            const tempVal = parseFloat(station.WeatherElement.AirTemperature);
            const windSpeedVal = parseFloat(station.WeatherElement.WindSpeed);
            const humidityVal = parseFloat(station.WeatherElement.RelativeHumidity);

            document.getElementById('temp').innerText = isNaN(tempVal) ? '--' : tempVal;
            document.getElementById('windSpeed').innerText = isNaN(windSpeedVal) ? '-- m/s' : `${windSpeedVal} m/s`;
            document.getElementById('humidity').innerText = isNaN(humidityVal) ? '-- %' : `${humidityVal} %`;

            // 中央氣象署 Steadman 體感溫度公式即時演算
            if (!isNaN(tempVal) && !isNaN(humidityVal) && !isNaN(windSpeedVal)) {
                const e = (humidityVal / 100) * 6.105 * Math.exp((17.27 * tempVal) / (237.7 + tempVal));
                const apparentTemp = 1.07 * tempVal + 0.2 * e - 0.65 * windSpeedVal - 2.7;
                document.getElementById('apparentTemp').innerText = `${apparentTemp.toFixed(1)} °C`;
            } else {
                document.getElementById('apparentTemp').innerText = `-- °C`;
            }

            let windDirRaw = station.WeatherElement.WindDirection;
            let displayWindText = "";

            if (typeof windDirRaw === 'number' || (!isNaN(parseFloat(windDirRaw)) && isFinite(windDirRaw))) {
                displayWindText = getWindDirectionText(parseFloat(windDirRaw));
            } else if (typeof windDirRaw === 'string') {
                displayWindText = windDirRaw;
            } else { displayWindText = '微風'; }

            document.getElementById('windDirection').innerText = displayWindText;
            updateWeatherIconDisplay(station);
        }

        function getWindDirectionText(degree) {
            if (degree >= 337.5 || degree < 22.5) return "北風";
            if (degree >= 22.5 && degree < 67.5) return "東北風";
            if (degree >= 67.5 && degree < 112.5) return "東風";
            if (degree >= 112.5 && degree < 157.5) return "東南風";
            if (degree >= 157.5 && degree < 202.5) return "南風";
            if (degree >= 202.5 && degree < 247.5) return "西南風";
            if (degree >= 247.5 && degree < 292.5) return "西風";
            if (degree >= 292.5 && degree < 337.5) return "西北風";
            return "微風";
        }

        function updateWeatherIconDisplay(station) {
            const iconEl = document.getElementById('weatherIcon');
            let isRainy = false;

            if (station.WeatherElement && station.WeatherElement.Weather) {
                if (station.WeatherElement.Weather.includes('雨')) { isRainy = true; }
            }

            if (isRainy) {
                iconEl.innerText = '🌧️';
                return;
            }

            const now = new Date();
            const sunsetText = document.getElementById('sunsetTime').innerText;
            const sunriseText = document.getElementById('sunriseTime').innerText;

            let sunsetTimeObj = new Date();
            let sunriseTimeObj = new Date();

            if (sunsetText && sunsetText.includes(':')) {
                const parts = sunsetText.split(':');
                sunsetTimeObj.setHours(parseInt(parts[0]), parseInt(parts[1]), 0);
            } else { sunsetTimeObj.setHours(18, 45, 0); }

            if (sunriseText && sunriseText.includes(':')) {
                const parts = sunriseText.split(':');
                sunriseTimeObj.setHours(parseInt(parts[0]), parseInt(parts[1]), 0);
            } else { sunriseTimeObj.setHours(5, 15, 0); }

            if (now >= sunsetTimeObj || now < sunriseTimeObj) {
                iconEl.innerText = '🌙';
            } else {
                let tempVal = parseFloat(station.WeatherElement.AirTemperature);
                iconEl.innerText = (tempVal > 30) ? '☀️' : '⛅';
            }
        }

        function renderTide(periods) {
            const container = document.getElementById('tideContainer');
            container.innerHTML = '';
            
            periods.slice(0, 2).forEach((dayData, idx) => {
                let highTides = []; let lowTides = [];
                dayData.Time.forEach(t => {
                    const timeStr = t.DateTime.substring(11, 16);
                    const height = t.TideHeights.AboveChartDatum;
                    if (t.Tide.includes('滿潮')) highTides.push(`${timeStr} (${height}cm)`);
                    else if (t.Tide.includes('乾潮')) lowTides.push(`${timeStr} (${height}cm)`);
                });

                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl shadow-sm border transition-all bg-white ${idx === 0 ? 'border-sky-400 ring-2 ring-sky-100' : 'border-slate-100'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                        <span class="text-base font-bold text-slate-800">${dayData.Date} (農曆 ${dayData.LunarDate.substring(5)})</span>
                        <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-md">潮差: ${dayData.TideRange}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div class="bg-red-50/60 p-2.5 rounded-xl"><span class="font-bold text-red-600 block mb-1">🔴 滿潮</span>${highTides.join('<br>')}</div>
                        <div class="bg-blue-50/60 p-2.5 rounded-xl"><span class="font-bold text-blue-600 block mb-1">🔵 乾潮</span>${lowTides.join('<br>')}</div>
                    </div>`;
                container.appendChild(card);
            });
        }

        function switchSubSection(type) {
            const sections = ['tide', 'rain'];
            sections.forEach(s => {
                const el = document.getElementById(`subSection-${s}`);
                const btn = document.getElementById(`tabBtn-${s}`);
                if (s === type) {
                    el.classList.remove('hidden');
                    btn.className = "px-4 py-2 rounded-xl font-bold text-sm bg-sky-600 text-white shadow-sm transition-all shrink-0";
                } else {
                    el.classList.add('hidden');
                    btn.className = "px-4 py-2 rounded-xl font-bold text-sm bg-white text-slate-600 border border-slate-100 shadow-sm transition-all shrink-0";
                }
            });
        }

        async function forceRefresh() {
            rawWeatherData = null;
            await fetchWeatherBaseData();
            if (isUsingManualSearch) handleLocationChange(); else runGPSLocation();
        }
    </script>
