    <header class="bg-sky-600 text-white p-4 sticky top-0 shadow-md z-50 flex justify-between items-center">

        </h1>

            <button id="togglePageBtn" class="bg-sky-700 hover:bg-sky-800 w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-colors shadow-sm focus:outline-none">🔍</button>

            <button id="refreshBtn" class="bg-sky-700 hover:bg-sky-800 w-10 h-10 rounded-xl flex items-center justify-center text-lg transition-colors shadow-sm focus:outline-none">🔄</button>

    </header>

            <div>

                    <!-- 由 JavaScript 動態生成 -->
                </select>

                    <div class="flex justify-between items-start">

                        <span class="text-xs bg-white/20 px-2 py-0.5 rounded-full" id="weatherTime">--:--</span>
                    </div>
                    <div class="flex items-baseline mt-2">
                        <span class="text-6xl font-extrabold tracking-tighter" id="temp">--</span>
                        <span class="text-2xl font-semibold ml-1">°C</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-white/20 text-sm">

                        </div>
                        <div>

                            <span class="text-base font-semibold mt-0.5 block" id="humidity">-- %</span>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 text-9xl opacity-10 font-bold">☀️</div>
            </section>

                { name: "長濱鄉", weatherStation: "成功", tideLocation: "臺東縣長濱鄉", lat: 23.3109, lng: 121.4547 }
            ],
            "澎湖縣": [
                { name: "馬公市 (漁港)", weatherStation: "澎湖", tideLocation: "漁港馬公", lat: 23.5660, lng: 119.5740 },
                { name: "湖西鄉 (沙港東)", weatherStation: "澎湖", tideLocation: "漁港沙港東", lat: 23.6040, lng: 119.6310 },
                { name: "白沙鄉 (吉貝海園)", weatherStation: "吉貝", tideLocation: "海水浴場吉貝海園" , lat: 23.7332, lng: 119.6032 },
                { name: "西嶼鄉", weatherStation: "澎湖", tideLocation: "澎湖縣西嶼鄉", lat: 23.6041, lng: 119.5000 },
                { name: "望安鄉", weatherStation: "澎湖", tideLocation: "澎湖縣望安鄉", lat: 23.3612, lng: 119.5097 },
                { name: "七美鄉", weatherStation: "澎湖", tideLocation: "澎湖縣七美鄉", lat: 23.1931, lng: 119.4179 }
            ],
            "金門縣": [
                { name: "金寧鄉", weatherStation: "金門", tideLocation: "金門縣金寧鄉", lat: 24.4617, lng: 118.2975 },
                { name: "烈嶼鄉", weatherStation: "金門", tideLocation: "金門縣烈嶼鄉", lat: 24.4266, lng: 118.2679 },
                { name: "烏坵鄉", weatherStation: "金門", tideLocation: "金門縣烏坵鄉", lat: 24.9881, lng: 119.4564 },
                { name: "金沙鎮", weatherStation: "金門", tideLocation: "金門縣金沙鎮", lat: 24.5324, lng: 118.4153 },
                { name: "金城鎮 (僅天氣)", weatherStation: "金門", tideLocation: null, lat: 24.4211, lng: 118.2892 },
                { name: "金湖鎮 (僅天氣)", weatherStation: "金門", tideLocation: null, lat: 24.4086, lng: 118.4300 }
            ],
            "連江縣": [
                { name: "南竿鄉 (福澳港)", weatherStation: "馬祖", tideLocation: "漁港福澳", lat: 26.1590, lng: 119.9420 },
                { name: "莒光鄉", weatherStation: "馬祖", tideLocation: "連江縣莒光鄉", lat: 25.9642, lng: 119.9600 },
                { name: "東引鄉", weatherStation: "馬祖", tideLocation: "連江縣東引鄉", lat: 26.3665, lng: 120.4835 },
                { name: "北竿鄉 (僅天氣)", weatherStation: "馬祖", tideLocation: null, lat: 26.2184, lng: 119.9982 }
            ]
        };

        const countySelect = document.getElementById('countySelect');
        const locationSelect = document.getElementById('locationSelect');
        const weatherSection = document.getElementById('weatherSection');
        const tideSection = document.getElementById('tideSection');
        const refreshBtn = document.getElementById('refreshBtn');
        const searchPage = document.getElementById('searchPage');
        const togglePageBtn = document.getElementById('togglePageBtn');
        const backToHomeBtn = document.getElementById('backToHomeBtn');
        const headerTitle = document.getElementById('headerTitle');

        let rawWeatherData = null;
        let isUsingManualSearch = false;

        window.addEventListener('DOMContentLoaded', initializeApp);
        countySelect.addEventListener('change', handleCountyChange);
        locationSelect.addEventListener('change', handleLocationChange);
        refreshBtn.addEventListener('click', forceRefresh);
        togglePageBtn.addEventListener('click', toggleSearchPage);
        backToHomeBtn.addEventListener('click', resetToGPSHome);

        async function initializeApp() {
            if (API_KEY === 'YOUR_API_KEY_HERE' || API_KEY.includes('填入')) {
                alert('請先填入中央氣象署 API 授權碼！');
                return;
            }
            await fetchWeatherBaseData();
            runGPSLocation();
        }

        async function fetchWeatherBaseData() {
            try {
                const weatherRes = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/O-A0001-001?Authorization=${API_KEY}`);
                const weatherJson = await weatherRes.json();
                if (weatherJson.success === "true") rawWeatherData = weatherJson.records.Station;
            } catch (error) {
                console.warn('天氣 API 連線失敗', error);
            }
        }

        function toggleSearchPage() {
            if (searchPage.classList.contains('hidden')) {
                searchPage.classList.remove('hidden');
                togglePageBtn.innerText = '🏠'; // 切換成純房子符號
                isUsingManualSearch = true;
                headerTitle.innerText = '🔍 手動查閱模式';
                handleCountyChange();
            } else {
                resetToGPSHome();
            }
        }

        function resetToGPSHome() {
            searchPage.classList.add('hidden');
            togglePageBtn.innerText = '🔍'; // 切換回純放大鏡符號
            isUsingManualSearch = false;
            headerTitle.innerText = '📍 當前位置觀測';
            runGPSLocation();
        }

        // 智慧型 GPS 定位：加入臺北市防張冠李戴機制
        function runGPSLocation() {
            if (!navigator.geolocation) {
                alert('您的瀏覽器不支援手機定位功能，為您切換至手動查詢。');
                toggleSearchPage();
                return;
            }

            headerTitle.innerText = '📍 定位中...';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    
                    let targetCounty = "";

                    // 【臺北市專用修正】利用概略經緯度邊界，直接判定使用者是否在台北市內（破除被板橋吸過去的問題）
                    if (userLat >= 24.96 && userLat <= 25.21 && userLng >= 121.46 && userLng <= 121.67) {
                        // 這是大台北地區，我們利用更精準的邊界防呆
                        // 台北市中心點大約在 25.03, 121.56，此機制能確保只要在台北市，就不會誤判定為新北市板橋
                        targetCounty = "臺北市";
                    }

                    let closestCounty = targetCounty || "基隆市";
                    let closestLoc = null;
                    let minDistance = Infinity;

                    // 如果確定是臺北市，直接在臺北市清單內找（不跨區比對）
                    if (targetCounty === "臺北市") {
                        closestLoc = STATION_MAPPING["臺北市"][0];
                        closestCounty = "臺北市";
                    } else {
                        // 如果不是台北市，再跑常規的環台最近距離配對
                        for (const [county, locations] of Object.entries(STATION_MAPPING)) {
                            locations.forEach(loc => {
                                if (!loc.lat || !loc.lng) return;
                                const dist = Math.sqrt(Math.pow(loc.lat - userLat, 2) + Math.pow(loc.lng - userLng, 2));
                                if (dist < minDistance) {
                                    minDistance = dist;
                                    closestCounty = county;
                                    closestLoc = loc;
                                }
                            });
                        }
                    }

                    if (closestLoc) {
                        headerTitle.innerText = `📍 首頁 (${closestLoc.name.substring(0,3)})`;
                        updateMainContent(closestCounty, closestLoc.weatherStation, closestLoc.tideLocation);
                    }
                },
                (error) => {
                    console.warn('定位失敗', error);
                    alert('無法取得您的 GPS 定位，自動切換至手動選單查詢。');
                    toggleSearchPage();
                },
                { enableHighAccuracy: true, timeout: 7000 }
            );
        }

        function handleCountyChange() {
            if (!isUsingManualSearch) return;
            
            const selectedCounty = countySelect.value;
            locationSelect.innerHTML = '';
            const list = STATION_MAPPING[selectedCounty] || [];

            if (list.length > 0) {
                list.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.name;
                    opt.innerText = `${item.name} ${item.tideLocation ? '🌊' : '☀️'}`;
                    opt.dataset.weatherStation = item.weatherStation;
                    opt.dataset.tideLocation = item.tideLocation || '';
                    locationSelect.appendChild(opt);
                });
                handleLocationChange();
            }
        }

        function handleLocationChange() {
            if (!isUsingManualSearch) return;

            const selectedOpt = locationSelect.selectedOptions[0];
            if (!selectedOpt) return;

            const targetWeatherName = selectedOpt.dataset.weatherStation;
            const targetTideName = selectedOpt.dataset.tideLocation;

            updateMainContent(countySelect.value, targetWeatherName, targetTideName);
        }

        async function updateMainContent(countyName, weatherStationName, tideLocationName) {
            if (rawWeatherData && weatherStationName) {
                const matchedWeather = rawWeatherData.find(st => st.StationName === weatherStationName);
                if (matchedWeather) renderWeather(countyName, matchedWeather);
            }

            const tideContainer = document.getElementById('tideContainer');
            if (tideLocationName) {
                tideSection.classList.remove('hidden');
                tideContainer.innerHTML = '<div class="text-center py-6 text-slate-400 text-sm">🔄 正在連線撈取最新潮汐資料...</div>';
                
                try {
                    const url = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}&LocationName=${encodeURIComponent(tideLocationName)}`;
                    const res = await fetch(url);
                    const data = await res.json();

                    if (data.success === "true" && data.records.TideForecasts.length > 0) {
                        const periods = data.records.TideForecasts[0].Location.TimePeriods.Daily;
                        renderTide(periods);
                    } else {
                        tideContainer.innerHTML = `<div class="text-center py-6 text-slate-400 text-sm">📍 氣象署暫無 [${tideLocationName}] 數據</div>`;
                    }
                } catch (error) {
                    console.error('連線異常:', error);
                    tideContainer.innerHTML = '<div class="text-center py-6 text-red-400 text-sm">⚠️ 讀取失敗，請確認該點是否發布預報。</div>';
                }
            } else {
                tideSection.classList.add('hidden');
                tideContainer.innerHTML = '';
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'text-center py-6 text-slate-400 text-sm';
                emptyMsg.innerText = '📍 此觀測點不包含潮汐預報。';
                tideContainer.appendChild(emptyMsg);
                tideSection.classList.remove('hidden');
            }
        }

        function renderWeather(countyName, station) {
            const obsTime = station.ObsTime.DateTime ? station.ObsTime.DateTime.substring(11, 16) : '--:--';
            document.getElementById('weatherStation').innerText = `${countyName} (${station.StationName})`;
            document.getElementById('weatherTime').innerText = `更新於 ${obsTime}`;
            
            let tempVal = station.WeatherElement.AirTemperature;
            let windVal = station.WeatherElement.WindSpeed;
            let humidVal = station.WeatherElement.RelativeHumidity;

            const isTempInvalid = (tempVal === -99 || tempVal === "-99" || tempVal === null || tempVal === undefined);

            if (isTempInvalid && rawWeatherData) {
                const backupStation = rawWeatherData.find(st => {
                    if (!st.GeoInfo || !st.GeoInfo.CountyName) return false;
                    return st.GeoInfo.CountyName === countyName && 
                           st.WeatherElement.AirTemperature !== -99 && 
                           st.WeatherElement.AirTemperature !== "-99" &&
                           st.WeatherElement.AirTemperature !== null;
                });
                
                if (backupStation) {
                    document.getElementById('weatherStation').innerText = `${countyName} (${backupStation.StationName}替補)`;
                    tempVal = backupStation.WeatherElement.AirTemperature;
                    windVal = backupStation.WeatherElement.WindSpeed;
                    humidVal = backupStation.WeatherElement.RelativeHumidity;
                }
            }

            document.getElementById('temp').innerText = (tempVal === -99 || tempVal === "-99" || tempVal === null) ? '--' : tempVal;
            document.getElementById('windSpeed').innerText = (windVal === -99 || windVal === "-99" || windVal === null) ? '-- m/s' : `${windVal} m/s`;
            document.getElementById('humidity').innerText = (humidVal === -99 || humidVal === "-99" || humidVal === null) ? '-- %' : `${humidVal} %`;
        }

        function renderTide(periods) {
            const container = document.getElementById('tideContainer');
            container.innerHTML = '';

            const today = new Date();
            const targetDates = [];
            for (let i = 0; i <= 1; i++) {
                const d = new Date();
                d.setDate(today.getDate() + i);
                targetDates.push({
                    dateString: d.toISOString().split('T')[0],
                    label: i === 0 ? '今天' : '明天',
                    isToday: i === 0
                });
            }

            targetDates.forEach(target => {
                const dayData = periods.find(p => p.Date === target.dateString);
                if (!dayData) return;

                let highTides = [];
                let lowTides = [];
                let heights = [];

                dayData.Time.forEach(t => {
                    const timeStr = t.DateTime.substring(11, 16);
                    const height = parseInt(t.TideHeights.AboveChartDatum);
                    heights.push(height);

                    if (t.Tide.includes('滿潮')) {
                        highTides.push(`${timeStr} (${height}cm)`);
                    } else if (t.Tide.includes('乾潮')) {
                        lowTides.push(`${timeStr} (${height}cm)`);
                    }
                });

                const maxTideDifference = heights.length > 0 ? (Math.max(...heights) - Math.min(...heights)) : 0;

                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl shadow-sm border transition-all ${
                    target.isToday ? 'bg-white border-sky-400 ring-2 ring-sky-100' : 'bg-white border-slate-100 opacity-85'
                }`;

                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-3">
                        <div class="flex items-center space-x-2">
                            <span class="text-base font-bold text-slate-800">${dayData.Date} (農曆 ${dayData.LunarDate.substring(5)})</span>
                            <span class="px-2 py-0.5 text-xs font-semibold rounded-full ${target.isToday ? 'bg-sky-500 text-white' : 'bg-slate-200 text-slate-600'}">${target.label}</span>
                        </div>
                        <span class="text-xs font-semibold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">潮差: ${dayData.TideRange} (${maxTideDifference}cm)</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div class="bg-red-50/60 p-2.5 rounded-xl">
                            <span class="font-bold text-red-600 block mb-1">🔴 滿潮時間</span>
                            <div class="space-y-0.5 text-slate-700 font-medium">${highTides.join('<br>') || '無資料'}</div>
                        </div>
                        <div class="bg-blue-50/60 p-2.5 rounded-xl">
                            <span class="font-bold text-blue-600 block mb-1">🔵 乾潮時間</span>
                            <div class="space-y-0.5 text-slate-700 font-medium">${lowTides.join('<br>') || '無資料'}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function forceRefresh() {
            rawWeatherData = null;
            await fetchWeatherBaseData();
            if (isUsingManualSearch) {
                handleLocationChange();
            } else {
                runGPSLocation();
            }
        }
    </script>
